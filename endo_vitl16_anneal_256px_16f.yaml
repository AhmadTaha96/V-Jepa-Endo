app: vjepa_2_1
folder: /ABSOLUTE/PATH/TO/vjepa21_endo_run
data:
  dataset_type: VideoDataset
  datasets:
  - /ABSOLUTE/PATH/TO/vjepa21_endo_run/endoscopy_train.csv
  batch_size: 12
  crop_size: 256
  patch_size: 16
  dataset_fpcs:
  - 16
  tubelet_size: 2
  fps: 4
  num_workers: 6
  pin_mem: true
data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0
loss:
  loss_exp: 1.0
  predict_all: true
  shift_by_n: 0
  weight_distance_loss: false
mask:
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 8
  spatial_scale:
  - 0.15
  - 0.15
  temporal_scale:
  - 1.0
  - 1.0
- aspect_ratio:
  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 2
  spatial_scale:
  - 0.7
  - 0.7
  temporal_scale:
  - 1.0
  - 1.0
meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: true
  read_checkpoint: null
  save_every_freq: 5
  seed: 239
  use_sdpa: true
model:
  has_cls_first: false
  img_temporal_dim_size: 1
  interpolate_rope: true
  is_causal: false
  lambda_value_img: 0.5
  lambda_value_vid: 0.5
  lambda_progressive: false
  modality_embedding: false
  model_name: vit_large
  n_registers: 0
  n_registers_predictor: 0
  normalize_predictor: false
  pred_depth: 24
  pred_embed_dim: 384
  pred_num_heads: 12
  pred_is_causal: false
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true
optimization:
  is_anneal: true
  anneal_ckpt: /ABSOLUTE/PATH/TO/vjepa21_endo_run/anneal_init.pth.tar
  resume_anneal: true
  ema:
  - 0.99925
  - 0.99925
  epochs: 15
  ipe: 300
  ipe_scale: 1.0
  lr: 0.0001
  final_lr: 1.0e-06
  start_lr: 0.0001
  warmup: 0
  weight_decay: 0.04
  final_weight_decay: 0.04
